name: Deploy HTML preview to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build & deploy HTML site to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect .html files into site/ and generate index
        run: |
          rm -rf site
          mkdir -p site
          
          # Copy all .html files while preserving relative paths; skip .git and site/ dir
          find . -path './.git' -prune -o -type f -name '*.html' -print0 \
            | while IFS= read -r -d '' file; do
                rel="${file#./}"
                case "$rel" in site/*) continue ;; esac
                mkdir -p "site/$(dirname "$rel")"
                cp "$file" "site/$rel"
              done
          
          # Generate index.html with your original HTML structure + list of all .html files
          cat > site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Home</title>
          </head>
          <body>
              <h1>Hello!</h1>
              <h3><i>"The lack of CSS is intentional."</i> ~ Zach @ <a href="https://zachlatta.com/">zachlatta.com</a></h3>
              <p>Anyways, enjoy some random html files!</p>
              <ul id="list">
          EOF
          
          # Find all .html files and add them to the list (excluding index.html itself)
          find site -type f -name '*.html' -print0 \
            | while IFS= read -r -d '' f; do
                rel="${f#site/}"
                if [ "$rel" != "index.html" ]; then
                  printf '                  <li><a href="/%s">%s</a></li>\n' "$rel" "$rel" >> site/index.html
                fi
              done
          
          cat >> site/index.html <<'EOF'
              </ul>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v2