<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hm;</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Null-Austin/pb-assets@main/PhantomSans-stylesheet.css">
    <script>
      // initalize important variables
      let points = []; // array of (dictionaries with x and y properties) points to draw
      let mouse = { x: 0, y: 0, down: false }; // mouse position

      // track mouse
      document.addEventListener("mousemove", (e) => {
        mouse.x = e.clientX; // update mouse x pos
        mouse.y = e.clientY; // update mouse y pos
      });
      document.addEventListener("mousedown", () => {
        mouse.down = true; // mouse is down
      });
      document.addEventListener("mouseup", () => {
        mouse.down = false; // mouse is up
      });

      function root() {
        //  starting function.

        // track mouse drop points. (After load)
        document.addEventListener("click", (e) => {
          points.push({ x: mouse.x, y: mouse.y }); // add point to array
        });

        let canvas = document.createElement("canvas"); // create canvas

        canvas.width = window.innerWidth; // set width
        canvas.height = window.innerHeight; // set height

        document.body.appendChild(canvas); // append to page

        let ctx = canvas.getContext("2d"); // get 2d draw context

        function clear() {
          ctx.fillStyle = "black";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        let cubes = [];
        for (let i = 0; i < 10; i++) {
          cubes.push(
            {
              x: Math.random() * canvas.width,
              y: Math.random() * canvas.height,
              size: Math.random() * (canvas.width * 0.1) + 10,
              rotation: Math.random() * 360,
              direction: Math.round(Math.random()),
              lifespan: Math.random() * 1 + 0.5, // lifespan between .5 and 1.5
            }
          )
        }

        function render() {
          clear(); // effectively clear the canvas from the old screen

          function preRender() {
            // draw background cubes and make them slowly rotate / move down (and a certain direction); with a life span where they slowly disappear (fade out). at .5 opacity; spawn a new one; and randomize the loss of life and everything else about them; but max out at 10 squares... and a square can be at most 10% width of the screen
            for (let cube of cubes) {
              ctx.save(); // save current state
              ctx.translate(cube.x, cube.y); // move to cube position
              ctx.rotate((cube.rotation * Math.PI) / 180); // rotate cube
              ctx.fillStyle = `rgba(15, 15, 15, ${cube.lifespan})`; // set opacity based on lifespan
              ctx.fillRect(
                -cube.size / 2,
                -cube.size / 2,
                cube.size,
                cube.size,
              ); // draw cube centered at position
              ctx.restore(); // restore state

              // update cube properties
              cube.rotation += 0.5; // rotate slowly
              cube.y += 0.5; // move down slowly
              if (cube.direction === 0)
                cube.x += 0.2; // move right slowly
              else cube.x -= 0.2; // move left slowly
              cube.lifespan -= Math.random() * 0.01; // decrease lifespan

              if (cube.lifespan <= 0) {
                cubes.splice(cubes.indexOf(cube), 1); // remove cube from array
                // if cube is dead
                // respawn cube with new properties
                cubes.push(
                  {
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * (canvas.width * 0.1) + 10,
                    rotation: Math.random() * 360,
                    direction: Math.round(Math.random()),
                    lifespan: Math.random() * 1 + 0.5, // lifespan between .5 and 1.5
                  }
                )
              }
            }
          }
          preRender(); // call preRender (for any updates before drawing)

          // draw all points
          for (let point of points) {
            // draw point
            ctx.fillStyle = "white"; // white color for point
            ctx.beginPath();
            ctx.arc(point.x, point.y, 5, 0, Math.PI * 2); // draw circle at point
            ctx.fill();
          }

          // randomize point order
          // points.sort(() => Math.random() - 0.5); // shuffle points array

          // connect all points like a spider web
          ctx.strokeStyle = "white"; // white color for lines
          ctx.lineWidth = 1; // thin lines
          ctx.beginPath();
          for (let i = 0; i < points.length; i++) {
            for (let j = i + 1; j < points.length; j++) {
              ctx.moveTo(points[i].x, points[i].y); // move to first point
              ctx.lineTo(points[j].x, points[j].y); // draw line to second point
            }
          }
          ctx.stroke(); // actually draw the lines

          // draw all texts
          ctx.fillStyle = "rgba(255, 255, 255, 0.5)"; // lighter color for text
          for (let point of points) {
            ctx.font = "12px bold Phantom Sans, sans-serif"; // set font
            ctx.fillText(
              `(${point.x}, ${point.y})`,
              point.x + 10,
              point.y - 10,
            ); // draw text near point
          }

          ctx.fillStyle = "rgba(255, 255, 255, 0.8)"; // brighter color for mouse circle
          ctx.beginPath();
          ctx.arc(mouse.x, mouse.y, 10, 0, Math.PI * 2); // draw circle at mouse position
          ctx.stroke(); // draw the circle
          if (mouse.down) {
            ctx.fill(); // fill circle if mouse is down
          }

          requestAnimationFrame(render); // call the render again (requestAnimationFrame: 60fps / dynamic)
        }
        render(); // start the render loop
      }

      document.addEventListener("DOMContentLoaded", root);
    </script>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body></body>
</html>
